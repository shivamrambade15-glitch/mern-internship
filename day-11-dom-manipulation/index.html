<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Anime DOM Manipulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <!-- SECTION 1: Change text & styles -->
    <section id="anime-intro-section">
      <h1 id="main-heading">Welcome to Anime World</h1>
      <p class="main-paragraph">
        Discover amazing anime series, from shonen battles to slice-of-life stories.
      </p>
      <button id="change-anime-btn">Change Anime Info & Styles</button>
    </section>

    <!-- SECTION 2: Show / hide paragraph -->
    <section id="synopsis-section">
      <h2>Anime Synopsis</h2>
      <p id="anime-synopsis">
        Naruto Uzumaki is a young ninja with a dream: to become Hokage and gain the
        respect of everyone in his village.
      </p>
      <button id="toggle-synopsis-btn">Hide Synopsis</button>
    </section>

    <!-- SECTION 3: Add new anime to list -->
    <section id="anime-list-section">
      <h2>Anime Watchlist</h2>
      <ul id="anime-list">
        <li class="anime-item">Naruto</li>
        <li class="anime-item">One Piece</li>
        <li class="anime-item">Attack on Titan</li>
      </ul>
      <button id="add-anime-btn">Add Anime to Watchlist</button>
    </section>
  </main>

  <!-- External JS at bottom of body -->
  <script src="script.js"></script>
</body>
</html>
