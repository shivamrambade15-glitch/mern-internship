<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My To-Do App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="todo-card">
      <header class="todo-header">
        <h1>My To-Do App</h1>
        <p class="subtitle">Stay on top of your day with a clean, simple list.</p>
      </header>

      <div class="input-row">
        <input
          type="text"
          id="task-input"
          placeholder="What do you need to do?"
          autocomplete="off"
        />
        <button id="add-btn">Add</button>
      </div>

      <div class="toolbar">
        <div class="counters">
          <span id="total-count">Total: 0</span>
          <span id="completed-count">Completed: 0</span>
          <span id="pending-count">Pending: 0</span>
        </div>

        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </div>

      <ul id="task-list" class="task-list"></ul>

      <footer class="todo-footer">
        <button id="clear-all-btn" class="btn-outline danger">
          Clear All Tasks
        </button>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
